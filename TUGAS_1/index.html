<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SITTA - 051472825</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- CSS Internal -->
    <style>
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 15% auto; padding: 20px; border-radius: 8px; width: 300px; text-align: center; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="login-bg">
    <main class="login-container">
        <h2>Selamat Datang</h2>
        <p style="color: #555; margin-bottom: 20px;">Aplikasi SITTA Universitas Terbuka</p> <!-- CSS Inline -->
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Masukkan email UT">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password">
            </div>
            <button type="submit" class="btn-primary">Masuk</button>
        </form>

        <div class="login-links">
            <a href="#" onclick="openModal('modalLupaPassword')">Lupa password?</a>
            <a href="#" onclick="openModal('modalDaftar')">Belum punya akun?</a>
        </div>
    </main>

    <!-- Modal Lupa Password -->
    <div id="modalLupaPassword" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modalLupaPassword')">&times;</span>
            <h3>Lupa Password</h3>
            <p>Silakan hubungi administrator UT Daerah Anda untuk mereset password.</p>
        </div>
    </div>

    <!-- Modal Daftar -->
    <div id="modalDaftar" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modalDaftar')">&times;</span>
            <h3>Daftar Akun</h3>
            <p>Pendaftaran akun SITTA hanya dapat dilakukan oleh Admin Pusat.</p>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
